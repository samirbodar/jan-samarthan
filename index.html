<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>જનસમર્થન - પોસ્ટર મેકર</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f2f5; text-align: center; margin: 0; padding: 10px; }
        .wrapper { max-width: 500px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        canvas { width: 100%; height: auto; display: block; }
        .controls { padding: 20px; border-top: 2px solid #eee; }
        .label { font-weight: bold; margin: 10px 0 5px 0; text-align: left; display: block; }
        input[type="text"] { width: 90%; padding: 12px; border: 2px solid #ff9933; border-radius: 8px; margin-bottom: 10px; }
        .btn-up { width: 100%; background: #007bff; color: white; padding: 14px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; }
        .btn-down { width: 100%; background: #28a745; color: white; padding: 16px; font-weight: bold; border-radius: 8px; border: none; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="wrapper">
    <canvas id="posterCanvas"></canvas>
    <div class="controls">
        <label class="label">૧. ફોટો અપલોડ કરો:</label>
        <button class="btn-up" onclick="document.getElementById('imageInput').click()">📸 ફોટો પસંદ કરો</button>
        <input type="file" id="imageInput" style="display:none" accept="image/*" onchange="handleImage(event)">

        <label class="label">૨. નામ લખો:</label>
        <input type="text" id="nameInput" placeholder="તમારું નામ અહિં લખો..." oninput="drawCanvas()">

        <button class="btn-down" onclick="downloadPoster()">📥 ડાઉનલોડ કરો</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('posterCanvas');
    const ctx = canvas.getContext('2d');
    const nameInput = document.getElementById('nameInput');
    let templateImg = new Image();
    let userImg = null;

    // File name must be poster.jpg on GitHub
    templateImg.src = 'poster.jpg?v=' + new Date().getTime(); 
    templateImg.onload = () => {
        canvas.width = templateImg.width;
        canvas.height = templateImg.height;
        drawCanvas();
    };

    function handleImage(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            userImg = new Image();
            userImg.onload = drawCanvas;
            userImg.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function drawCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(templateImg, 0, 0);

        const w = canvas.width;
        const h = canvas.height;

        if (userImg) {
            ctx.save();
            ctx.beginPath();
            // Photo position adjusted slightly down
            let circleX = w * 0.812; 
            let circleY = h * 0.785; 
            let radius = w * 0.165; 
            
            ctx.arc(circleX, circleY, radius, 0, Math.PI * 2);
            ctx.clip();
            ctx.drawImage(userImg, circleX - radius, circleY - radius, radius * 2, radius * 2);
            ctx.restore();
        }

        // Display name only if input is not empty
        const name = nameInput.value;
        if (name) {
            ctx.font = "bold " + (w * 0.048) + "px Arial";
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            // Name box position
            ctx.fillText(name, w * 0.822, h * 0.928);
        }
    }

    function downloadPoster() {
        const link = document.createElement('a');
        link.download = 'Jan_Samarthan_Poster.png';
        link.href = canvas.toDataURL();
        link.click();
    }
</script>
</body>
</html>
