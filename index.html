<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>જનસમર્થન - પોસ્ટર મેકર</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f2f5; text-align: center; margin: 0; padding: 10px; }
        .wrapper { max-width: 500px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        canvas { width: 100%; height: auto; display: block; background: #fff; }
        .controls { padding: 20px; border-top: 2px solid #eee; background: #fff; }
        .label { font-weight: bold; color: #444; margin: 10px 0 5px 0; text-align: left; font-size: 14px; }
        input[type="text"] { width: 90%; padding: 12px; font-size: 16px; border: 2px solid #ff9933; border-radius: 8px; outline: none; margin-bottom: 10px; }
        .btn-up { width: 100%; background: #007bff; color: white; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; }
        .btn-down { width: 100%; background: #28a745; color: white; padding: 16px; font-size: 18px; font-weight: bold; border-radius: 8px; border: none; margin-top: 10px; cursor: pointer; }
        #imageInput { display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <canvas id="posterCanvas"></canvas>
    <div class="controls">
        <div class="label">૧. તમારો ફોટો પસંદ કરો:</div>
        <button class="btn-up" onclick="document.getElementById('imageInput').click()">📸 ફોટો અપલોડ કરો</button>
        <input type="file" id="imageInput" accept="image/*" onchange="handleImage(event)">

        <div class="label">૨. તમારું નામ લખો:</div>
        <input type="text" id="nameInput" placeholder="અહિં નામ લખો..." oninput="drawCanvas()">

        <button class="btn-down" onclick="downloadPoster()">📥 પોસ્ટર સેવ કરો</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('posterCanvas');
    const ctx = canvas.getContext('2d');
    const nameInput = document.getElementById('nameInput');
    let templateImg = new Image();
    let userImg = null;

    // फाइल का नाम वही रखें जो आपने GitHub पर अपलोड की है
    templateImg.src = 'poster.jpg?v=' + new Date().getTime(); 
    
    templateImg.onload = () => {
        canvas.width = templateImg.width;
        canvas.height = templateImg.height;
        drawCanvas();
    };

    function handleImage(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            userImg = new Image();
            userImg.onload = drawCanvas;
            userImg.src = event.target.result;
        }
        reader.readAsDataURL(e.target.files[0]);
    }

    function drawCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(templateImg, 0, 0);

        if (userImg) {
            ctx.save();
            ctx.beginPath();
            // --- फोटो के गोले की सटीक सेटिंग ---
            // X=812 (Center), Y=1805 (काफी नीचे), Radius=285 (बड़ा गोला)
            ctx.arc(812, 1805, 285, 0, Math.PI * 2); 
            ctx.clip();
            // फोटो को गोले में फिट करना
            ctx.drawImage(userImg, 527, 1520, 570, 570); 
            ctx.restore();
        }

        // --- नाम की सटीक सेटिंग ---
        const name = nameInput.value || "";
        ctx.font = "bold 80px Arial"; // नाम थोड़ा बड़ा कर दिया है
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        // सबसे नीचे वाले ऑरेंज बॉक्स की पोजीशन
        ctx.fillText(name, 822, 2275); 
    }

    function downloadPoster() {
        const link = document.createElement('a');
        link.download = 'Jan_Samarthan_Poster.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>
</body>
</html>
