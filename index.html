<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>જનસમર્થન પોસ્ટર</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f8f9fa; text-align: center; margin: 0; padding: 5px; }
        .main-wrapper { max-width: 500px; margin: 0 auto; }
        .canvas-container { background: white; padding: 5px; border-radius: 15px 15px 0 0; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        canvas { width: 100%; height: auto; display: block; border-radius: 10px 10px 0 0; }
        .controls-card { background: white; padding: 20px; border-radius: 0 0 15px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 1px solid #eee; }
        .section-label { font-size: 16px; font-weight: bold; color: #555; margin: 10px 0 5px 0; text-align: left; }
        input[type="text"] { width: 90%; padding: 12px; font-size: 16px; border: 1.5px solid #ff9933; border-radius: 8px; margin-bottom: 15px; outline: none; }
        .btn-upload { width: 100%; background: #e7f1ff; color: #007bff; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 8px; border: 2px dashed #007bff; cursor: pointer; margin-bottom: 10px; }
        .btn-download { width: 100%; background: #ff9933; color: white; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 8px; border: none; margin-top: 10px; cursor: pointer; }
        #imageInput { display: none; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="canvas-container">
            <canvas id="posterCanvas"></canvas>
        </div>
        <div class="controls-card">
            <div class="section-label">૧. ફોટો અપલોડ કરો:</div>
            <button class="btn-upload" onclick="document.getElementById('imageInput').click()">+ ફોટો પસંદ કરો</button>
            <input type="file" id="imageInput" accept="image/*" onchange="handleImage(event)">
            <div class="section-label">૨. તમારું નામ લખો:</div>
            <input type="text" id="nameInput" placeholder="અહિં નામ લખો..." oninput="drawCanvas()">
            <button class="btn-download" onclick="downloadPoster()">પોસ્ટર સેવ કરો (Download)</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('posterCanvas');
        const ctx = canvas.getContext('2d');
        const nameInput = document.getElementById('nameInput');
        let templateImg = new Image();
        let userImg = null;
        
        templateImg.src = 'poster.jpg'; 
        templateImg.onload = () => {
            canvas.width = templateImg.width;
            canvas.height = templateImg.height;
            drawCanvas();
        };

        function handleImage(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                userImg = new Image();
                userImg.onload = drawCanvas;
                userImg.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(templateImg, 0, 0);
            if (userImg) {
                ctx.save();
                ctx.beginPath();
                // सर्कल की सही पोजीशन
                ctx.arc(812, 1025, 155, 0, Math.PI * 2); 
                ctx.clip();
                ctx.drawImage(userImg, 657, 870, 310, 310); 
                ctx.restore();
            }
            const name = nameInput.value || "";
            ctx.font = "bold 45px Arial";
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            // नाम की सही पोजीशन
            ctx.fillText(name, 822, 1265); 
        }

        function downloadPoster() {
            const link = document.createElement('a');
            link.download = 'BJP_JanSamarthan.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
