<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> BJP જનસમર્થન </title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; text-align: center; margin: 0; padding: 10px; }
        .wrapper { max-width: 500px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        canvas { width: 100%; height: auto; display: block; background: #fff; }
        .controls { padding: 25px; border-top: 1px solid #eee; background: #ffffff; }
        .label { font-weight: bold; color: #333; margin: 15px 0 8px 0; text-align: left; display: block; font-size: 15px; }
        input[type="text"] { width: 92%; padding: 14px; font-size: 16px; border: 2px solid #ff9933; border-radius: 10px; outline: none; margin-bottom: 15px; }
        .btn-up { width: 100%; background: #007bff; color: white; padding: 16px; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; transition: 0.3s; }
        .btn-up:hover { background: #0056b3; }
        .btn-down { width: 100%; background: #28a745; color: white; padding: 18px; font-size: 18px; font-weight: bold; border-radius: 10px; border: none; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="wrapper">
    <canvas id="posterCanvas"></canvas>
    <div class="controls">
        <label class="label">૧. તમારો ફોટો અપલોડ કરો:</label>
        <button class="btn-up" onclick="document.getElementById('imageInput').click()">📸 ફોટો પસંદ કરો</button>
        <input type="file" id="imageInput" style="display:none" accept="image/*" onchange="handleImage(event)">

        <label class="label">૨. તમારું નામ લખો:</label>
        <input type="text" id="nameInput" placeholder="અહિં નામ ટાઈપ કરો..." oninput="drawCanvas()">

        <button class="btn-down" onclick="downloadPoster()">📥 પોસ્ટર સેવ કરો</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('posterCanvas');
    const ctx = canvas.getContext('2d');
    const nameInput = document.getElementById('nameInput');
    let templateImg = new Image();
    let userImg = null;

    // पक्का करें कि GitHub पर आपकी फाइल का नाम poster.jpg ही हो
    templateImg.src = 'poster.jpg?v=' + new Date().getTime(); 
    
    templateImg.onload = () => {
        canvas.width = templateImg.width;
        canvas.height = templateImg.height;
        drawCanvas();
    };

    function handleImage(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            userImg = new Image();
            userImg.onload = drawCanvas;
            userImg.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function drawCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(templateImg, 0, 0);

        const w = canvas.width;
        const h = canvas.height;

        // १. फोटो की सटीक पोजीशन (घेरे के एकदम बीच में)
        if (userImg) {
            ctx.save();
            ctx.beginPath();
            // फोटो का घेरा पोस्टर की ऊंचाई के ७९% हिस्से पर सेट किया गया है
            let circleX = w * 0.812; 
            let circleY = h * 0.792; 
            let radius = w * 0.163; 
            
            ctx.arc(circleX, circleY, radius, 0, Math.PI * 2);
            ctx.clip();
            ctx.drawImage(userImg, circleX - radius, circleY - radius, radius * 2, radius * 2);
            ctx.restore();
        }

        // २. नाम टाइप करने पर ही पुराने टेक्स्ट को छुपाना और नया लिखना
        const name = nameInput.value;
        if (name) {
            // पुराने "તમારું નામ" को ढकने के लिए एक छोटा ऑरेंज पैच
            ctx.fillStyle = "#f39333"; // आपके पोस्टर का ऑरेंज कलर
            ctx.beginPath();
            ctx.roundRect(w * 0.69, h * 0.902, w * 0.26, h * 0.052, 15);
            ctx.fill();

            // नया नाम लिखना
            ctx.font = "bold " + (w * 0.048) + "px Arial";
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.fillText(name, w * 0.822, h * 0.938);
        }
    }

    function downloadPoster() {
        const link = document.createElement('a');
        link.download = 'Jan_Samarthan_Poster.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    // राउंड रेक्टेंगल सपोर्ट के लिए (पुराने ब्राउज़र्स के लिए)
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x, y + h, r);
            this.arcTo(x, y + h, x, y, r);
            this.arcTo(x, y, x + w, y, r);
            this.closePath();
            return this;
        };
    }
</script>
</body>
</html>
